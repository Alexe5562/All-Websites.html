<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECLox | Word Whisper</title>
    <link rel="icon" href="https://yt3.googleusercontent.com/eLhH2cQa1E5KteF1WOgiIsof7XLLkQ-L1lYUMt5mzJe3RX_5qNqJiKJRRYg28S0ukP5XfwTF0O8=s160-c-k-c0x00ffffff-no-rj">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="glass-card page-card game-page-card">
        <div class="nav-row"><a class="ghost-button" href="games.html">Back to games</a><span class="badge">Live game</span></div>
        <p class="eyebrow">Real game</p>
        <h1>Word Whisper</h1>
        <p class="subtle">Unscramble the word and type the correct answer.</p>
        <div class="mini-game-card" id="wordBox"></div>
        <input class="game-answer" id="wordInput" type="text" placeholder="Type the correct word" />
        <button class="cta-button" id="checkBtn" type="button">Check answer</button>
        <p class="small-note" id="wordStatus">Try to beat your best streak.</p>
      </section>
    </main>
    <script>
      const wordBox = document.getElementById('wordBox');
      const status = document.getElementById('wordStatus');
      const input = document.getElementById('wordInput');
      const checkBtn = document.getElementById('checkBtn');
      const words = ['ECLox', 'Code', 'Learn', 'Bright', 'Play'];
      let currentWord = '';
      function shuffle(word) {
        return [...word].sort(() => Math.random() - 0.5).join('');
      }
      function nextWord() {
        currentWord = words[Math.floor(Math.random() * words.length)];
        wordBox.innerHTML = `<p class="eyebrow">Unscramble</p><h3>${shuffle(currentWord)}</h3><p class="small-note">Type the real word below.</p>`;
      }
      checkBtn.addEventListener('click', () => {
        if (input.value.trim().toLowerCase() === currentWord.toLowerCase()) {
          status.textContent = 'Correct! You solved the word.';
          status.style.color = '#67fbe7';
          nextWord();
          input.value = '';
        } else {
          status.textContent = 'Try again — check the letters.';
          status.style.color = '#d7e3ff';
        }
      });
      nextWord();
    </script>
  </body>
</html>

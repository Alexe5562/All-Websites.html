<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06101d" />
    <title>ECLox</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="https://yt3.googleusercontent.com/eLhH2cQa1E5KteF1WOgiIsof7XLLkQ-L1lYUMt5mzJe3RX_5qNqJiKJRRYg28S0ukP5XfwTF0O8=s160-c-k-c0x00ffffff-no-rj">
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="login-panel" id="loginPanel">
        <div class="glass-card login-card">
          <p class="eyebrow">ECLox Access</p>
          <h1>Log in to enter your creative world</h1>
          <p class="subtle">Enter any username and a 4+ character password to continue to the welcome page.</p>
          <form id="loginForm" class="login-form">
            <label>
              Username
              <input id="usernameInput" type="text" placeholder="Enter your username" required />
            </label>
            <label>
              Password
              <input id="passwordInput" type="password" placeholder="Enter your password" required />
            </label>
            <button type="submit" class="cta-button">Verify account</button>
          </form>
          <p id="loginMessage" class="login-message">Tip: any non-empty username and a 4+ character password will pass.</p>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>

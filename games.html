<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECLox | Games</title>
    <link rel="icon" href="https://yt3.googleusercontent.com/eLhH2cQa1E5KteF1WOgiIsof7XLLkQ-L1lYUMt5mzJe3RX_5qNqJiKJRRYg28S0ukP5XfwTF0O8=s160-c-k-c0x00ffffff-no-rj">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="glass-card page-card">
        <div class="nav-row">
          <a class="ghost-button" href="welcome.html">Back to home</a>
          <div class="action-row">
            <button id="shuffleGamesButton" class="ghost-button" type="button">Refresh games</button>
            <span class="badge" id="gameCountLabel">30 games</span>
          </div>
        </div>
        <p class="eyebrow">Games</p>
        <h1>30 playable games, ready to refresh at any time</h1>
        <p class="subtle">Choose a card or press refresh to shuffle the entire list and try a new random set.</p>
        <div class="game-layout">
          <div id="gamesGrid" class="grid cards-grid games-grid"></div>
          <aside class="game-console glass-card">
            <p class="eyebrow">Play mode</p>
            <h3 id="activeGameTitle">Pick a game</h3>
            <p id="activeGameDescription" class="subtle">Choose any card to start a quick challenge.</p>
            <div id="challengeBox" class="challenge-box">No challenge active yet.</div>
            <button id="randomGameButton" class="cta-button" type="button">Pick random game</button>
          </aside>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
